<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .info {
            color: #666;
            line-height: 1.8;
            font-size: 15px;
            margin: 25px 0;
        }

        .info p {
            margin: 10px 0;
        }

        .label {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-image">👨‍🎓</div>
        
        <h1>Stephanie G. Pomarejos</h1>
        
        <div class="info">
            <p><span class="label">School:</span> ESSU-ARTECGE </p>
            <p><span class="label">Major:</span> BSIT </p>
            <p><span class="label">Year:</span> 4th Year </p>
            <p><span class="label">Email:</span> pomarejosstephanie30@gmail.com</p>
        </div>
    </div>
</body>
</html>
